<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./assets/css/style.css" />
  <title>Calculadora de Adição</title>
</head>

<body>
  <div class="card">
    <div class="card-header">
      <div class="icon"><i class="ri-add-line"></i></div>
      <h1>Calculadora de Adição</h1>
      <p>Informe dois números inteiros para somar</p>
    </div>
    <div class="input-group">
      <label>Primeiro Número</label>
      <input type="number" id="num1" placeholder="Digite um número inteiro" />
    </div>
    <div class="operador"><i class="ri-add-line"></i></div>
    <div class="input-group">
      <label>Segundo Número</label>
      <input type="number" id="num2" placeholder="Digite um número inteiro" />
    </div>
    <button class="btn-calcular" onclick="calcular()">Calcular Soma</button>
    <button class="btn-limpar" onclick="limpar()">
      <i class="ri-delete-bin-6-line"></i>Limpar
    </button>
    <div class="erro" id="erro">
      ⚠️ Por favor, insira dois valores numéricos inteiros válidos.
    </div>
    <div class="resultado" id="resultado">
      <div class="label">Resultado da Soma</div>
      <div class="expressao" id="expressao"></div>
      <div class="valor" id="soma"></div>
    </div>
  </div>
  <script src="./assets/js/app.js"></script>
</body>

</html>
